<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KASANE - SNS運用代行・スクール事業化 伴走型コンサルティング</title>
  <style>
    /* UTAGE環境向けのスコープ限定スタイル */
    .kasane-lp-v2 {
      display: block;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      color: #333333 !important;
      line-height: 1.8 !important;
      background-color: #fcfcfc !important;
      font-size: 19px !important;
      -webkit-text-size-adjust: 100%;
      width: 100%;
    }
    .kasane-lp-v2 * {
      box-sizing: border-box !important;
      margin: 0;
      padding: 0;
      border: none;
      text-decoration: none;
    }
    .kasane-container {
      max-width: 1080px !important;
      margin: 0 auto !important;
      padding: 0 20px !important;
      width: 100%;
    }
    
    /* セクション共通 */
    .kasane-section {
      padding: 100px 0 !important;
      background-color: transparent !important;
    }
    .kasane-section-title {
      font-size: 38px !important;
      font-weight: 700 !important;
      text-align: center !important;
      color: #0a192f !important;
      margin-bottom: 60px !important;
      position: relative !important;
      padding-bottom: 20px !important;
      font-family: "Times New Roman", "Yu Mincho", "MS Mincho", serif;
    }
    .kasane-section-title::after {
      content: '' !important;
      position: absolute !important;
      bottom: 0 !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      width: 80px !important;
      height: 4px !important;
      background-color: #d4af37 !important;
    }

    /* ボタン */
    .kasane-btn {
      display: inline-block !important;
      background: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%) !important;
      color: #ffffff !important;
      padding: 24px 50px !important;
      font-size: 26px !important;
      font-weight: 700 !important;
      border-radius: 4px !important;
      transition: all 0.3s ease !important;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2) !important;
      text-align: center !important;
      cursor: pointer !important;
    }
    .kasane-btn:hover {
      transform: translateY(-3px) !important;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3) !important;
      opacity: 0.9 !important;
    }

    /* アニメーション定義 */
    .anim-ready {
      opacity: 0;
      transform: translateY(30px);
      transition: all 1.2s ease-out;
    }
    .anim-active {
      opacity: 1 !important;
      transform: translateY(0) !important;
    }
    
    @keyframes titleFade {
      from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .animate-hero-title {
      animation: titleFade 1.8s ease-out forwards;
    }

    /* ヒーローエリア（背景画像スクロールアニメーション実装） */
    .kasane-hero {
      position: relative !important;
      overflow: hidden !important;
      padding: 180px 0 !important;
      text-align: center !important;
      background-color: #0a192f !important;
      width: 100%;
    }
    
    /* 3枚の画像がシームレスに横に流れるアニメーション構造 */
    .kasane-hero-slider {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 400% !important; /* 4枚分を横に並べる */
      height: 100% !important;
      display: flex !important;
      z-index: 1 !important;
      animation: heroScrollAnim 30s linear infinite !important;
    }
    
    .kasane-hero-slide {
      width: 25% !important;
      height: 100% !important;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
    }
    
    .kasane-hero-slide.img1 { background-image: url('https://drive.google.com/uc?export=view&id=1K2LeRgAetruzWWKp3P3cquW9YguC11Wv') !important; }
    .kasane-hero-slide.img2 { background-image: url('https://drive.google.com/uc?export=view&id=12tbc5HMeiWzVttzavc9HS1C_ozlCwB5C') !important; }
    .kasane-hero-slide.img3 { background-image: url('https://drive.google.com/uc?export=view&id=1zm1XVzj1aXMyO0blJjJbz99makVEkrPj') !important; }
    
    @keyframes heroScrollAnim {
      0% { transform: translateX(0); }
      100% { transform: translateX(-75%); }
    }
    
    .kasane-hero-overlay {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background: linear-gradient(to bottom, rgba(10, 25, 47, 0.82) 0%, rgba(10, 25, 47, 0.78) 100%) !important;
      z-index: 2 !important;
    }
    
    .kasane-hero .kasane-container { position: relative !important; z-index: 3 !important; }
    
    .kasane-hero-sub { font-size: 24px !important; letter-spacing: 0.1em !important; color: #d4af37 !important; margin-bottom: 25px !important; font-weight: bold !important; text-shadow: 0 2px 8px rgba(0,0,0,0.85) !important; }
    .kasane-hero-title { font-size: 44px !important; font-weight: 700 !important; line-height: 1.6 !important; margin-bottom: 40px !important; color: #ffffff !important; font-family: "Times New Roman", "Yu Mincho", "MS Mincho", serif; text-shadow: 0 2px 12px rgba(0,0,0,0.9) !important; }
    .kasane-hero-emphasis { font-size: 72px !important; color: #d4af37 !important; display: block !important; margin-bottom: 15px !important; border-bottom: 3px solid #d4af37; width: fit-content; margin-left: auto; margin-right: auto; padding-bottom: 5px; text-shadow: 0 2px 12px rgba(0,0,0,0.9) !important; }
    .kasane-hero-desc { font-size: 22px; color: #e1e8ed; margin-bottom: 40px; font-weight: 500; line-height: 1.6; text-shadow: 0 2px 8px rgba(0,0,0,0.85) !important; }

    /* ... (the rest of the CSS from the snippet omitted for brevity) */
  </style>
</head>
<body>
<div class="kasane-lp-v2">
  <section class="kasane-hero">
    <div class="kasane-hero-slider">
      <div class="kasane-hero-slide img1"></div>
      <div class="kasane-hero-slide img2"></div>
      <div class="kasane-hero-slide img3"></div>
      <div class="kasane-hero-slide img1"></div>
    </div>
    <div class="kasane-hero-overlay"></div>
    <div class="kasane-container">
      <p class="kasane-hero-sub">SNS運用代行・スクール事業化 伴走型コンサルティング</p>
      <div class="animate-hero-title">
        <h1 class="kasane-hero-title">
          <span class="kasane-hero-emphasis">地域密着型</span>
          コストを最大限まで削減したオンラインの活用プラン「KASANE」
        </h1>
      </div>
      <p class="kasane-hero-desc">オンラインの時代だからこそ、膝を突き合わせて付き合いたい</p>
      <a href="https://forms.gle/wtcBGWDrY5M7ytAZ8" target="_blank" rel="noopener" class="kasane-btn">個別相談・お見積もりはこちら</a>
    </div>
  </section>
  <!-- Additional sections (strength, pain, proposal, service, etc.) should be inserted here following the same structure as in the original file. -->
</div>
<script>
  const observerOptions = { threshold: 0.1 };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('anim-active');
    });
  }, observerOptions);
  document.querySelectorAll('.anim-ready').forEach(el => observer.observe(el));
  document.addEventListener('DOMContentLoaded', function() {
    const checkboxes = document.querySelectorAll('.sim-calc');
    const imgCountInput = document.getElementById('threads-img-count');
    const imgPriceLabel = document.getElementById('threads-img-price');
    const totalLabel = document.getElementById('sim-total');
    const THREADS_IMG_UNIT_PRICE = 2000;
    function calculateTotal(){
      let total = 0;
      checkboxes.forEach(cb=>{ if(cb.checked) total+=parseInt(cb.dataset.price,10); });
      const count = parseInt(imgCountInput.value,10)||0;
      const threadsImgTotal = count*THREADS_IMG_UNIT_PRICE;
      imgPriceLabel.textContent = threadsImgTotal.toLocaleString()+'円';
      total+=threadsImgTotal;
      totalLabel.textContent = total.toLocaleString();
    }
    checkboxes.forEach(cb=>cb.addEventListener('change', calculateTotal));
    imgCountInput.addEventListener('input', calculateTotal);
    imgCountInput.addEventListener('change', calculateTotal);
  });
</script>
</body>
</html>
